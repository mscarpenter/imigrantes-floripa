<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="1000" height="460" rx="20" fill="#fbf8f4"/>

  <text x="40" y="54" font-size="30" font-weight="700" fill="#4a3d6b">Como funciona a integracao</text>
  <text x="40" y="82" font-size="16" fill="#5b6478">Do seu bairro ao destino, pagando uma so passagem.</text>

  <!-- Node 1: Bairro -->
  <g>
    <rect x="44" y="120" width="244" height="150" rx="18" fill="#ffffff" stroke="#e4e2dd"/>
    <rect x="68" y="146" width="56" height="56" rx="14" fill="#ede8f5"/>
    <g transform="translate(80,158)" fill="none" stroke="#6e5594" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11.5 16 2l13 9.5"/>
      <path d="M6 13v14h20V13"/>
      <path d="M13 27v-7h6v7"/>
    </g>
    <text x="68" y="232" font-size="19" font-weight="700" fill="#1b2440">Seu bairro</text>
    <text x="68" y="256" font-size="14" fill="#5b6478">Voce pega o onibus perto de casa.</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="300" y1="195" x2="356" y2="195" stroke="#6e5594" stroke-width="3"/>
    <path d="M356 195 l-12 -7 v14 z" fill="#6e5594"/>
    <text x="328" y="178" font-size="13" font-weight="600" fill="#6e5594" text-anchor="middle">linha</text>
    <text x="328" y="228" font-size="13" font-weight="600" fill="#6e5594" text-anchor="middle">alimentadora</text>
  </g>

  <!-- Node 2: Terminal -->
  <g>
    <rect x="378" y="120" width="244" height="150" rx="18" fill="#ffffff" stroke="#e4e2dd"/>
    <rect x="402" y="146" width="56" height="56" rx="14" fill="#f6e7df"/>
    <g transform="translate(414,158)" fill="none" stroke="#c56a3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="24" height="20" rx="3"/>
      <path d="M4 14h24"/>
      <circle cx="11" cy="26" r="2.5"/>
      <circle cx="21" cy="26" r="2.5"/>
    </g>
    <text x="402" y="232" font-size="19" font-weight="700" fill="#1b2440">Terminal</text>
    <text x="402" y="256" font-size="14" fill="#5b6478">Voce troca de onibus sem pagar de novo.</text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="634" y1="195" x2="690" y2="195" stroke="#6e5594" stroke-width="3"/>
    <path d="M690 195 l-12 -7 v14 z" fill="#6e5594"/>
    <text x="662" y="178" font-size="13" font-weight="600" fill="#6e5594" text-anchor="middle">linha</text>
    <text x="662" y="228" font-size="13" font-weight="600" fill="#6e5594" text-anchor="middle">troncal</text>
  </g>

  <!-- Node 3: Destino -->
  <g>
    <rect x="712" y="120" width="244" height="150" rx="18" fill="#ffffff" stroke="#e4e2dd"/>
    <rect x="736" y="146" width="56" height="56" rx="14" fill="#ede8f5"/>
    <g transform="translate(748,158)" fill="none" stroke="#6e5594" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 27V13l7-4v18"/>
      <path d="M10 27V7l9-5 9 5v20"/>
    </g>
    <text x="736" y="232" font-size="19" font-weight="700" fill="#1b2440">Centro / destino</text>
    <text x="736" y="256" font-size="14" fill="#5b6478">Chega ao TICEN ou a outro terminal.</text>
  </g>

  <!-- Banner: regra do cartao -->
  <rect x="44" y="312" width="912" height="56" rx="14" fill="#f6e7df" stroke="#e8c4b0"/>
  <circle cx="78" cy="340" r="7" fill="#c56a3f"/>
  <text x="100" y="345" font-size="16" fill="#1b2440"><tspan font-weight="700">Com o cartao Passe Rapido:</tspan> 1 passagem ? ate 3 horas ? trocas ilimitadas no sistema convencional.</text>

  <text x="44" y="398" font-size="13.5" fill="#9a6b53">Sem cartao (dinheiro ou QR avulso), cada embarque e cobrado de novo ? a integracao nao vale.</text>
</svg>
