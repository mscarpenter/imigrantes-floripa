    <text x="648" y="580" font-size="11" fill="#5b6478" text-anchor="middle">Rio Tavares</text>
  </g>

  <!-- Legenda -->
  <rect x="40" y="640" width="920" height="56" rx="12" fill="#ffffff" stroke="#e4e2dd"/>
  <circle cx="72" cy="668" r="10" fill="#6e5594"/>
  <text x="92" y="673" font-size="13" fill="#3a4256">Terminal de integracao</text>
  <circle cx="280" cy="668" r="12" fill="#c56a3f"/>
  <text x="302" y="673" font-size="13" fill="#3a4256">TICEN (hub principal)</text>
  <rect x="480" y="658" width="24" height="6" rx="2" fill="#c56a3f"/>
  <text x="514" y="673" font-size="13" fill="#3a4256">Pontes Centro / Continente</text>
  <text x="960" y="673" font-size="11" fill="#888" text-anchor="end">Posicoes: OSM � mapa ilustrativo</text>
