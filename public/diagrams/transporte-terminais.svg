    <text x="378" y="400" font-size="11" fill="#5b6478" text-anchor="middle">Trindade / UFSC</text>
  </g>

  <!-- TICEN -27.5949, -48.556 (hub principal) -->
  <g id="ticen">
    <circle cx="228" cy="388" r="24" fill="#c56a3f" stroke="#ffffff" stroke-width="3"/>
    <text x="228" y="395" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">TI</text>
    <rect x="188" y="348" width="62" height="24" rx="6" fill="#b1542f"/>
    <text x="219" y="364" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">TICEN</text>
    <text x="228" y="428" font-size="11" font-weight="600" fill="#b1542f" text-anchor="middle">Hub principal � Centro</text>
  </g>

  <!-- TILAG -27.6022, -48.467 -->
  <g id="tilag">
    <circle cx="768" cy="408" r="18" fill="#6e5594" stroke="#ffffff" stroke-width="3"/>
    <text x="768" y="414" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">TI</text>
    <rect x="700" y="372" width="58" height="22" rx="6" fill="#4a3d6b"/>
    <text x="729" y="387" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">TILAG</text>
    <text x="768" y="440" font-size="11" fill="#5b6478" text-anchor="middle">Lagoa da Conceicao</text>
  </g>

  <!-- TIRIO -27.671, -48.4945 -->
  <g id="tirio">
