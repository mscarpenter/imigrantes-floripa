name: Bot — monitoria

on:
  schedule:
    # Diário 06:00 BRT (09:00 UTC)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  actions: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const botWorkflows = [
              "Bot — validar rascunhos",
              "Bot — pesquisar e checar contatos",
              "Bot — pesquisar cursos",
              "Bot — monitoria",
            ];
            const since = new Date(Date.now() - 8 * 24 * 60 * 60 * 1000).toISOString();
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 50,
              created: `>=${since}`,
            });
            const failed = runs.workflow_runs.filter(
              (r) =>
                botWorkflows.includes(r.name ?? "") &&
                r.conclusion === "failure" &&
                r.status === "completed",
            );
            if (failed.length === 0) {
              core.info("Nenhuma falha recente nos workflows do bot.");
              return;
            }
            const lines = failed.map(
              (r) => `- ${r.name} (#${r.run_number}) — ${r.html_url}`,
            );
            const title = "Bot: falhas recentes nos jobs automatizados";
            const body = [
              "Um ou mais workflows do bot falharam nos últimos 8 dias:",
              "",
              ...lines,
              "",
              "Revise os logs no GitHub Actions e corrija ou dispense conscientemente.",
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "bot,monitor",
            });
            if (issues.some((i) => i.title === title)) {
              core.info("Issue de monitoria já aberta — não duplicar.");
              return;
            }
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["bot", "monitor"],
            });
