name: Bot — validar rascunhos

on:
  pull_request:
    paths:
      - "bot/**"
      - "src/lib/data/courses.json"
      - "src/lib/data/course-schema.ts"
      - "scripts/bot/**"
  workflow_dispatch:

jobs:
  validate-drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm test -- bot-drafts course-schema
